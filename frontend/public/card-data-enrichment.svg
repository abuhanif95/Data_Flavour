<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="bgB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#120B2F" />
      <stop offset="100%" stop-color="#1E1B4B" />
    </linearGradient>
    <linearGradient id="lensB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A78BFA" />
      <stop offset="100%" stop-color="#60A5FA" />
    </linearGradient>
    <filter id="glowB" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" rx="24" fill="url(#bgB)" />

  <g stroke="#4C1D95" stroke-opacity="0.55">
    <line x1="110" y1="130" x2="700" y2="130" />
    <line x1="110" y1="210" x2="700" y2="210" />
    <line x1="110" y1="290" x2="700" y2="290" />
    <line x1="110" y1="370" x2="700" y2="370" />
    <line x1="170" y1="90" x2="170" y2="410" />
    <line x1="290" y1="90" x2="290" y2="410" />
    <line x1="410" y1="90" x2="410" y2="410" />
    <line x1="530" y1="90" x2="530" y2="410" />
    <line x1="650" y1="90" x2="650" y2="410" />
  </g>

  <circle cx="390" cy="245" r="95" fill="url(#lensB)" fill-opacity="0.35" stroke="#C4B5FD" stroke-width="10" filter="url(#glowB)" />
  <line x1="458" y1="313" x2="565" y2="408" stroke="#C084FC" stroke-width="20" stroke-linecap="round" filter="url(#glowB)" />

  <circle cx="330" cy="220" r="11" fill="#67E8F9" />
  <circle cx="370" cy="280" r="11" fill="#67E8F9" />
  <circle cx="430" cy="230" r="11" fill="#67E8F9" />
  <line x1="330" y1="220" x2="370" y2="280" stroke="#67E8F9" stroke-width="4" />
  <line x1="370" y1="280" x2="430" y2="230" stroke="#67E8F9" stroke-width="4" />

  <circle cx="600" cy="130" r="6" fill="#F0ABFC" filter="url(#glowB)" />
  <circle cx="640" cy="180" r="4" fill="#C4B5FD" />
  <circle cx="200" cy="370" r="5" fill="#A78BFA" />
</svg>
