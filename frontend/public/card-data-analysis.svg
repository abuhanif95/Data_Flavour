<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07142A" />
      <stop offset="100%" stop-color="#0F1E3E" />
    </linearGradient>
    <linearGradient id="barA" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0EA5E9" />
      <stop offset="100%" stop-color="#67E8F9" />
    </linearGradient>
    <filter id="glowA" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" rx="24" fill="url(#bgA)" />

  <g stroke="#1E3A8A" stroke-opacity="0.55">
    <line x1="110" y1="400" x2="700" y2="400" />
    <line x1="110" y1="335" x2="700" y2="335" />
    <line x1="110" y1="270" x2="700" y2="270" />
    <line x1="110" y1="205" x2="700" y2="205" />
    <line x1="110" y1="140" x2="700" y2="140" />
  </g>

  <g fill="url(#barA)" filter="url(#glowA)">
    <rect x="150" y="310" width="60" height="90" rx="10" />
    <rect x="240" y="270" width="60" height="130" rx="10" />
    <rect x="330" y="225" width="60" height="175" rx="10" />
    <rect x="420" y="182" width="60" height="218" rx="10" />
    <rect x="510" y="138" width="60" height="262" rx="10" />
    <rect x="600" y="96" width="60" height="304" rx="10" />
  </g>

  <polyline
    points="180,296 270,258 360,212 450,170 540,130 630,86"
    stroke="#7DD3FC"
    stroke-width="10"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glowA)"
  />

  <line x1="630" y1="86" x2="712" y2="45" stroke="#7DD3FC" stroke-width="10" stroke-linecap="round" filter="url(#glowA)" />
  <polygon points="712,45 684,48 699,72" fill="#7DD3FC" />
</svg>
