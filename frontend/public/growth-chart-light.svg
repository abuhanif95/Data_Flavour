<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0F9FF" />
      <stop offset="100%" stop-color="#E0F2FE" />
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0.95" />
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0EA5E9" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)" />

  <g stroke="#BFDBFE" stroke-opacity="0.9">
    <line x1="100" y1="680" x2="1100" y2="680" />
    <line x1="100" y1="560" x2="1100" y2="560" />
    <line x1="100" y1="440" x2="1100" y2="440" />
    <line x1="100" y1="320" x2="1100" y2="320" />
    <line x1="100" y1="200" x2="1100" y2="200" />
  </g>

  <g fill="url(#bar)" filter="url(#softGlow)">
    <rect x="180" y="520" width="90" height="160" rx="8" />
    <rect x="320" y="460" width="90" height="220" rx="8" />
    <rect x="460" y="390" width="90" height="290" rx="8" />
    <rect x="600" y="330" width="90" height="350" rx="8" />
    <rect x="740" y="260" width="90" height="420" rx="8" />
    <rect x="880" y="190" width="90" height="490" rx="8" />
  </g>

  <polyline
    points="225,500 365,435 505,365 645,300 785,230 925,165"
    stroke="url(#line)"
    stroke-width="10"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#softGlow)"
  />

  <g filter="url(#softGlow)">
    <line x1="925" y1="165" x2="1025" y2="95" stroke="#2563EB" stroke-width="12" stroke-linecap="round" />
    <polygon points="1025,95 986,99 1008,132" fill="#2563EB" />
  </g>
</svg>
